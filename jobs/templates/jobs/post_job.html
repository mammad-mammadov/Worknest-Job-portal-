<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job - WorkNest</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .post-container{
            background-color: white;
            width: 450px;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            color: #2563eb;
            margin-bottom: 30px;
        }

        label{
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 8px;
        }

        input{
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            border: none;
            background-color: #2563eb;
            color: white;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background-color: #1d4ed8;
        }

        .back{
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }
#darkModeToggle{
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    border: none;
    border-radius: 50%;
    background: #2563eb;
    color: white;
    font-size: 24px;
    cursor: pointer;
    z-index: 999;
}

.dark-mode{
    background:#111827 !important;
    color:white !important;
}

.dark-mode .navbar{
    background:#0f172a !important;
}

.dark-mode .job-container,
.dark-mode .apply-container,
.dark-mode .post-container,
.dark-mode .register-box,
.dark-mode .login-box,
.dark-mode .card,
.dark-mode .container{
    background:#1f2937 !important;
    color:white !important;
}

.dark-mode p,
.dark-mode label,
.dark-mode h1,
.dark-mode h2,
.dark-mode .info{
    color:white !important;
}

.dark-mode input,
.dark-mode textarea{
    background:#374151 !important;
    color:white !important;
    border:1px solid #555 !important;
}

.dark-mode a{
    color:#93c5fd !important;
}
    </style>

</head>
<body>

    <div class="post-container">

        <h1>Post a Job</h1>

        <form method="POST">

            {% csrf_token %}

            <label>Job Title</label>
            {{ form.title }}

            <label>Company</label>
            {{ form.company }}

            <label>Salary</label>
            {{ form.salary }}

            <label>City</label>
            {{ form.city }}

            <button type="submit">
                Submit for Review
            </button>

        </form>

        <a href="/" class="back">
            ← Back to Jobs
        </a>

    </div>
<button id="darkModeToggle">🌙</button>

<script>
    const darkModeToggle = document.getElementById("darkModeToggle");

    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark-mode");
        darkModeToggle.textContent = "☀️";
    }

    darkModeToggle.addEventListener("click", function () {
        document.body.classList.toggle("dark-mode");

        if (document.body.classList.contains("dark-mode")) {
            localStorage.setItem("darkMode", "enabled");
            darkModeToggle.textContent = "☀️";
        } else {
            localStorage.setItem("darkMode", "disabled");
            darkModeToggle.textContent = "🌙";
        }
    });
</script>
</body>
</html>
