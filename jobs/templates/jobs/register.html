<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - WorkNest</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-box{
            width: 420px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }

        .logo{
            text-align: center;
            color: #2563eb;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        h1{
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle{
            text-align: center;
            color: #777;
            margin-bottom: 25px;
        }

        label{
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input{
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .helptext{
            display: none;
        }

        ul{
            display: none;
        }

        button{
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            cursor: pointer;
        }

        button:hover{
            background: #1d4ed8;
        }

        .links{
            text-align: center;
            margin-top: 20px;
        }

        .links a{
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }
        #darkModeToggle{
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    border: none;
    border-radius: 50%;
    background: #2563eb;
    color: white;
    font-size: 24px;
    cursor: pointer;
    z-index: 999;
}

.dark-mode{
    background:#111827 !important;
    color:white !important;
}

.dark-mode .navbar{
    background:#0f172a !important;
}

.dark-mode .job-container,
.dark-mode .apply-container,
.dark-mode .post-container,
.dark-mode .register-box,
.dark-mode .login-box,
.dark-mode .card,
.dark-mode .container{
    background:#1f2937 !important;
    color:white !important;
}

.dark-mode p,
.dark-mode label,
.dark-mode h1,
.dark-mode h2,
.dark-mode .info{
    color:white !important;
}

.dark-mode input,
.dark-mode textarea{
    background:#374151 !important;
    color:white !important;
    border:1px solid #555 !important;
}

.dark-mode a{
    color:#93c5fd !important;
}
    </style>
</head>

<body>

    <div class="register-box">

        <div class="logo">WorkNest</div>

        <h1>Create Account</h1>
        <p class="subtitle">Join WorkNest and find your dream job</p>

        <form method="POST">
            {% csrf_token %}

            {{ form.errors }}
            
            {{ form.as_p }}

            <button type="submit">Register</button>
        </form>

        <div class="links">
            <a href="/">← Back to Jobs</a>
        </div>

    </div>
<button id="darkModeToggle">🌙</button>

<script>
    const darkModeToggle = document.getElementById("darkModeToggle");

    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark-mode");
        darkModeToggle.textContent = "☀️";
    }

    darkModeToggle.addEventListener("click", function () {
        document.body.classList.toggle("dark-mode");

        if (document.body.classList.contains("dark-mode")) {
            localStorage.setItem("darkMode", "enabled");
            darkModeToggle.textContent = "☀️";
        } else {
            localStorage.setItem("darkMode", "disabled");
            darkModeToggle.textContent = "🌙";
        }
    });
</script>
</body>
</html>
